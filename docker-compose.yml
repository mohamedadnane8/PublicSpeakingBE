services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: publicspeaking-api
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # These will be overridden by .env file or host env vars
      - ConnectionStrings__DefaultConnection=${CONNECTION_STRING}
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-MyApp}
      - Jwt__Audience=${JWT_AUDIENCE:-MyAppUsers}
      - Jwt__AccessTokenExpiryMinutes=${JWT_ACCESS_EXPIRY:-15}
      - Jwt__RefreshTokenExpiryDays=${JWT_REFRESH_EXPIRY:-7}
      - GoogleOAuth__ClientId=${GOOGLE_CLIENT_ID}
      - GoogleOAuth__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - GoogleOAuth__RedirectUri=${GOOGLE_REDIRECT_URI}
      - Frontend__BaseUrl=${FRONTEND_URL}
      - AuthCookies__SameSite=${AUTH_COOKIES_SAMESITE:-Strict}
      - AuthCookies__Secure=${AUTH_COOKIES_SECURE:-true}
      - S3Storage__BucketName=${S3_BUCKET_NAME}
      - S3Storage__Region=${S3_REGION:-eu-north-1}
      # AWS credentials for S3 SDK (do not expose to frontend)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN:-}
      - AWS_REGION=${S3_REGION:-eu-north-1}
      - AWS_DEFAULT_REGION=${S3_REGION:-eu-north-1}
      # Optional explicit binding (same values) if you prefer app-level config
      - S3Storage__AccessKeyId=${AWS_ACCESS_KEY_ID}
      - S3Storage__SecretAccessKey=${AWS_SECRET_ACCESS_KEY}
      - S3Storage__SessionToken=${AWS_SESSION_TOKEN:-}
      # DeepSeek AI
      - DeepSeek__ApiKey=${DEEPSEEK_API_KEY}
      - DeepSeek__BaseUrl=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      # Resume upload config
      - ResumeUpload__UploadCooldownHours=${RESUME_COOLDOWN_HOURS:-24}
      - ResumeUpload__QuestionsPerBatch=${RESUME_QUESTIONS_PER_BATCH:-50}
      - ResumeUpload__EnableSecondBatch=${RESUME_ENABLE_SECOND_BATCH:-true}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL container (if you want to run DB locally)
  # db:
  #   image: postgres:16-alpine
  #   container_name: publicspeaking-db
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_DB=publicspeaking
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

